<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 390" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="390" fill="#ffffff"/>
  <text x="20" y="30" font-size="22" font-weight="700" fill="#114B58">QoS – Priorisierung über Warteschlangen</text>
  <text x="20" y="50" font-size="13" fill="#5A6B70">Pakete werden klassifiziert, in Prioritäts-Queues sortiert und vom Scheduler in der richtigen Reihenfolge gesendet.</text>

  <defs><marker id="qa" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#5A6B70"/></marker></defs>

  <!-- incoming mixed -->
  <text x="90" y="80" font-size="12" font-weight="700" fill="#114B58" text-anchor="middle">Eingang (gemischt)</text>
  <g>
    <rect x="40" y="180" width="22" height="16" rx="2" fill="#C0504D"/>
    <rect x="66" y="180" width="22" height="16" rx="2" fill="#8A99A0"/>
    <rect x="92" y="180" width="22" height="16" rx="2" fill="#2F6E86"/>
    <rect x="40" y="200" width="22" height="16" rx="2" fill="#8A99A0"/>
    <rect x="66" y="200" width="22" height="16" rx="2" fill="#C0504D"/>
    <rect x="92" y="200" width="22" height="16" rx="2" fill="#8A99A0"/>
  </g>
  <line x1="120" y1="198" x2="168" y2="198" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#qa)"/>

  <!-- classifier -->
  <rect x="172" y="166" width="110" height="64" rx="8" fill="#114B58"/>
  <text x="227" y="194" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Klassifi-</text>
  <text x="227" y="212" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">zierung</text>

  <!-- queues -->
  <g font-size="12.5" font-weight="700">
    <!-- high -->
    <rect x="330" y="96" width="300" height="48" rx="7" fill="#FBEEEC" stroke="#C0504D"/>
    <text x="345" y="118" fill="#C0504D">Hoch</text><text x="345" y="134" font-size="10.5" fill="#9A3E3B" font-weight="400">VoIP / Echtzeit</text>
    <rect x="470" y="108" width="20" height="24" rx="2" fill="#C0504D"/><rect x="494" y="108" width="20" height="24" rx="2" fill="#C0504D"/>
    <!-- med -->
    <rect x="330" y="160" width="300" height="48" rx="7" fill="#EAF2F4" stroke="#2F6E86"/>
    <text x="345" y="182" fill="#2F6E86">Mittel</text><text x="345" y="198" font-size="10.5" fill="#27566A" font-weight="400">interaktiv (DB, RDP)</text>
    <rect x="470" y="172" width="20" height="24" rx="2" fill="#2F6E86"/>
    <!-- low -->
    <rect x="330" y="224" width="300" height="48" rx="7" fill="#EEF1F2" stroke="#8A99A0"/>
    <text x="345" y="246" fill="#5A6B70">Niedrig</text><text x="345" y="262" font-size="10.5" fill="#5A6B70" font-weight="400">Download / Backup</text>
    <rect x="470" y="236" width="20" height="24" rx="2" fill="#8A99A0"/><rect x="494" y="236" width="20" height="24" rx="2" fill="#8A99A0"/><rect x="518" y="236" width="20" height="24" rx="2" fill="#8A99A0"/>
  </g>
  <line x1="282" y1="186" x2="326" y2="120" stroke="#5A6B70" stroke-width="2" marker-end="url(#qa)"/>
  <line x1="282" y1="198" x2="326" y2="184" stroke="#5A6B70" stroke-width="2" marker-end="url(#qa)"/>
  <line x1="282" y1="210" x2="326" y2="248" stroke="#5A6B70" stroke-width="2" marker-end="url(#qa)"/>

  <!-- scheduler -->
  <rect x="680" y="150" width="96" height="76" rx="8" fill="#0E9FB0"/>
  <text x="728" y="182" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Sche-</text>
  <text x="728" y="200" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">duler</text>
  <line x1="630" y1="120" x2="678" y2="172" stroke="#C0504D" stroke-width="2.5" marker-end="url(#qa)"/>
  <line x1="630" y1="184" x2="678" y2="188" stroke="#2F6E86" stroke-width="2" marker-end="url(#qa)"/>
  <line x1="630" y1="248" x2="678" y2="204" stroke="#8A99A0" stroke-width="2" marker-end="url(#qa)"/>

  <!-- output -->
  <line x1="776" y1="188" x2="868" y2="188" stroke="#5A6B70" stroke-width="3" marker-end="url(#qa)"/>
  <text x="828" y="178" font-size="12" font-weight="700" fill="#114B58" text-anchor="middle">Ausgang</text>
  <text x="828" y="214" font-size="11" fill="#5A6B70" text-anchor="middle">Trunk / WAN</text>

  <text x="20" y="330" font-size="12.5" fill="#3A4A4F"><tspan font-weight="700" fill="#114B58">CoS</tspan> markiert auf Schicht 2 (3-Bit-Feld 0–7 im 802.1Q-Trunk), <tspan font-weight="700" fill="#114B58">DiffServ/DSCP</tspan> auf Schicht 3 (6 Bit im IP-Header).</text>
  <text x="20" y="352" font-size="12.5" fill="#3A4A4F">Hohe Priorität (VoIP) wird vorgezogen → weniger Latenz und Jitter; niedrige Priorität wartet oder wird verworfen.</text>
</svg>
