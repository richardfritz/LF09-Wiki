<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">Kollisions- und Broadcastdomänen</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Kollisionsdomäne = Bereich, in dem sich Pakete „stoßen“ können. Broadcastdomäne = Bereich, den ein Broadcast erreicht.</text>

  <!-- Card Hub -->
  <g>
    <rect x="20" y="74" width="276" height="320" rx="10" fill="#F2F9FB" stroke="#D7EEF1"/>
    <rect x="20" y="74" width="276" height="40" rx="10" fill="#2F536E"/>
    <text x="158" y="100" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Hub · Schicht 1</text>
    <rect x="118" y="150" width="80" height="30" rx="5" fill="#2F536E"/><text x="158" y="170" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">HUB</text>
    <g fill="#114B58">
      <rect x="50" y="230" width="34" height="26" rx="3"/><rect x="141" y="230" width="34" height="26" rx="3"/><rect x="232" y="230" width="34" height="26" rx="3"/>
    </g>
    <line x1="138" y1="180" x2="67" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <line x1="158" y1="180" x2="158" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <line x1="178" y1="180" x2="249" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <ellipse cx="158" cy="243" rx="130" ry="46" fill="none" stroke="#C0504D" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="158" y="316" font-size="13" font-weight="700" fill="#C0504D" text-anchor="middle">1 Kollisionsdomäne</text>
    <text x="158" y="336" font-size="13" font-weight="700" fill="#2E7C92" text-anchor="middle">1 Broadcastdomäne</text>
    <text x="158" y="366" font-size="11.5" fill="#5A6B70" text-anchor="middle">Alle teilen sich die Bandbreite,</text>
    <text x="158" y="381" font-size="11.5" fill="#5A6B70" text-anchor="middle">Kollisionen bremsen das Netz.</text>
  </g>

  <!-- Card Switch -->
  <g>
    <rect x="312" y="74" width="276" height="320" rx="10" fill="#F2F9FB" stroke="#D7EEF1"/>
    <rect x="312" y="74" width="276" height="40" rx="10" fill="#2F607A"/>
    <text x="450" y="100" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Switch · Schicht 2</text>
    <rect x="410" y="150" width="80" height="30" rx="5" fill="#2F607A"/><text x="450" y="170" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">SWITCH</text>
    <g fill="#114B58">
      <rect x="342" y="230" width="34" height="26" rx="3"/><rect x="433" y="230" width="34" height="26" rx="3"/><rect x="524" y="230" width="34" height="26" rx="3"/>
    </g>
    <line x1="430" y1="180" x2="359" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <line x1="450" y1="180" x2="450" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <line x1="470" y1="180" x2="541" y2="230" stroke="#9AB0B6" stroke-width="2"/>
    <ellipse cx="359" cy="245" rx="28" ry="30" fill="none" stroke="#C0504D" stroke-width="2" stroke-dasharray="5 3"/>
    <ellipse cx="450" cy="245" rx="28" ry="30" fill="none" stroke="#C0504D" stroke-width="2" stroke-dasharray="5 3"/>
    <ellipse cx="541" cy="245" rx="28" ry="30" fill="none" stroke="#C0504D" stroke-width="2" stroke-dasharray="5 3"/>
    <text x="450" y="316" font-size="13" font-weight="700" fill="#C0504D" text-anchor="middle">je Port 1 Kollisionsdom.</text>
    <text x="450" y="336" font-size="13" font-weight="700" fill="#2E7C92" text-anchor="middle">1 Broadcastdomäne</text>
    <text x="450" y="366" font-size="11.5" fill="#5A6B70" text-anchor="middle">Volle Bandbreite je Port.</text>
    <text x="450" y="381" font-size="11.5" fill="#5A6B70" text-anchor="middle">VLAN teilt die Broadcastdomäne.</text>
  </g>

  <!-- Card Router -->
  <g>
    <rect x="604" y="74" width="276" height="320" rx="10" fill="#F2F9FB" stroke="#D7EEF1"/>
    <rect x="604" y="74" width="276" height="40" rx="10" fill="#2F6E86"/>
    <text x="742" y="100" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Router · Schicht 3</text>
    <circle cx="742" cy="165" r="24" fill="#2F6E86"/><text x="742" y="170" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">RTR</text>
    <rect x="648" y="235" width="70" height="26" rx="5" fill="#2F607A"/><text x="683" y="252" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SW A</text>
    <rect x="766" y="235" width="70" height="26" rx="5" fill="#2F607A"/><text x="801" y="252" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SW B</text>
    <line x1="725" y1="185" x2="683" y2="235" stroke="#9AB0B6" stroke-width="2"/>
    <line x1="759" y1="185" x2="801" y2="235" stroke="#9AB0B6" stroke-width="2"/>
    <ellipse cx="683" cy="248" rx="42" ry="34" fill="none" stroke="#2E7C92" stroke-width="2.5" stroke-dasharray="6 4"/>
    <ellipse cx="801" cy="248" rx="42" ry="34" fill="none" stroke="#2E7C92" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="742" y="316" font-size="13" font-weight="700" fill="#2E7C92" text-anchor="middle">trennt Broadcastdomänen</text>
    <text x="742" y="336" font-size="13" font-weight="700" fill="#114B58" text-anchor="middle">je Interface ein Netz</text>
    <text x="742" y="366" font-size="11.5" fill="#5A6B70" text-anchor="middle">Broadcasts bleiben lokal;</text>
    <text x="742" y="381" font-size="11.5" fill="#5A6B70" text-anchor="middle">Netze über IP verbunden.</text>
  </g>
</svg>
