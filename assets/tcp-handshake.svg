<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">TCP-Verbindungsaufbau – Drei-Wege-Handschlag</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Vor dem Datenaustausch synchronisieren beide Seiten ihre Sequenznummern.</text>

  <defs><marker id="ah" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#2F6E86"/></marker></defs>

  <!-- endpoints -->
  <rect x="110" y="74" width="120" height="40" rx="8" fill="#2F6E86"/><text x="170" y="100" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Client</text>
  <rect x="530" y="74" width="120" height="40" rx="8" fill="#114B58"/><text x="590" y="100" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Server</text>
  <line x1="170" y1="114" x2="170" y2="356" stroke="#C7D5D9" stroke-width="2" stroke-dasharray="4 4"/>
  <line x1="590" y1="114" x2="590" y2="356" stroke="#C7D5D9" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- 1 SYN -->
  <text x="380" y="146" font-size="14" font-weight="700" fill="#114B58" text-anchor="middle">1) SYN</text>
  <text x="380" y="163" font-size="12" fill="#5A6B70" text-anchor="middle">„Ich möchte verbinden“ · SEQ = x</text>
  <line x1="172" y1="172" x2="588" y2="172" stroke="#2F6E86" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 2 SYN-ACK -->
  <text x="380" y="216" font-size="14" font-weight="700" fill="#114B58" text-anchor="middle">2) SYN, ACK</text>
  <text x="380" y="233" font-size="12" fill="#5A6B70" text-anchor="middle">„Einverstanden“ · SEQ = y, ACK = x+1</text>
  <line x1="588" y1="242" x2="172" y2="242" stroke="#2F6E86" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 3 ACK -->
  <text x="380" y="286" font-size="14" font-weight="700" fill="#114B58" text-anchor="middle">3) ACK</text>
  <text x="380" y="303" font-size="12" fill="#5A6B70" text-anchor="middle">„Bestätigt“ · ACK = y+1</text>
  <line x1="172" y1="312" x2="588" y2="312" stroke="#2F6E86" stroke-width="2.5" marker-end="url(#ah)"/>

  <rect x="240" y="338" width="280" height="32" rx="16" fill="#E7F5F7"/>
  <text x="380" y="359" font-size="13" font-weight="700" fill="#0E7C8C" text-anchor="middle">Verbindung steht – Daten fließen</text>
</svg>
