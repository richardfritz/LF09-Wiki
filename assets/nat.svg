<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">NAT / PAT – private Adressen ins Internet</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Der Router ersetzt die private Quelladresse durch seine öffentliche IP und merkt sich die Zuordnung über Ports.</text>

  <!-- LAN -->
  <rect x="20" y="80" width="220" height="150" rx="10" fill="#F2F9FB" stroke="#D7EEF1"/>
  <text x="130" y="104" font-size="13" font-weight="700" fill="#2F6E86" text-anchor="middle">Privates LAN (192.168.0.0/24)</text>
  <rect x="44" y="124" width="44" height="32" rx="4" fill="#2F6E86"/>
  <text x="100" y="138" font-size="12" font-weight="700" fill="#1F2D31">PC1</text>
  <text x="100" y="153" font-size="11" fill="#5A6B70">192.168.0.10</text>
  <rect x="44" y="180" width="44" height="32" rx="4" fill="#2F6E86"/>
  <text x="100" y="194" font-size="12" font-weight="700" fill="#1F2D31">PC2</text>
  <text x="100" y="209" font-size="11" fill="#5A6B70">192.168.0.11</text>

  <!-- Router NAT -->
  <rect x="330" y="100" width="170" height="110" rx="10" fill="#2F6E86"/>
  <text x="415" y="128" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Router · NAT (PAT)</text>
  <text x="415" y="156" font-size="12" fill="#D7EEF1" text-anchor="middle">innen: 192.168.0.1</text>
  <text x="415" y="178" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="700">außen: 203.0.113.5</text>

  <!-- Internet -->
  <ellipse cx="760" cy="150" rx="100" ry="56" fill="#EAF0F2" stroke="#C7D5D9"/>
  <text x="760" y="146" font-size="15" font-weight="700" fill="#465A60" text-anchor="middle">Internet</text>
  <text x="760" y="168" font-size="11.5" fill="#5A6B70" text-anchor="middle">Server 198.51.100.7</text>

  <!-- arrows -->
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 z" fill="#5A6B70"/></marker></defs>
  <line x1="240" y1="150" x2="328" y2="150" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#a)"/>
  <line x1="500" y1="150" x2="656" y2="150" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#a)"/>

  <!-- NAT table -->
  <text x="20" y="266" font-size="15" font-weight="700" fill="#114B58">NAT-Tabelle (Übersetzungstabelle)</text>
  <rect x="20" y="278" width="860" height="34" rx="6" fill="#114B58"/>
  <text x="40" y="300" font-size="13" font-weight="700" fill="#fff">Interne IP : Port</text>
  <text x="300" y="300" font-size="13" font-weight="700" fill="#fff">Externe IP : Port (am Router)</text>
  <text x="620" y="300" font-size="13" font-weight="700" fill="#fff">Ziel (Server)</text>
  <g font-size="13" font-family="Consolas, monospace">
    <rect x="20" y="312" width="860" height="32" fill="#F2F9FB"/>
    <text x="40" y="333" fill="#1F2D31">192.168.0.10 : 50000</text>
    <text x="300" y="333" fill="#2F6E86" font-weight="700">203.0.113.5 : 6000</text>
    <text x="620" y="333" fill="#1F2D31">198.51.100.7 : 443</text>
    <rect x="20" y="344" width="860" height="32" fill="#ffffff"/>
    <text x="40" y="365" fill="#1F2D31">192.168.0.11 : 50001</text>
    <text x="300" y="365" fill="#2F6E86" font-weight="700">203.0.113.5 : 6001</text>
    <text x="620" y="365" fill="#1F2D31">198.51.100.7 : 443</text>
  </g>
  <rect x="20" y="312" width="860" height="64" rx="4" fill="none" stroke="#D7EEF1"/>
  <text x="20" y="402" font-size="12" fill="#5A6B70">PAT (NAT-Überladung): viele interne Geräte teilen sich EINE öffentliche IP – unterschieden werden sie über den Port.</text>
</svg>
