<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 370" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="370" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">DMZ – die entmilitarisierte Zone</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Öffentliche Dienste stehen in einem eigenen, abgeschotteten Netz zwischen zwei Firewalls.</text>

  <defs><marker id="fa" markerWidth="11" markerHeight="11" refX="7" refY="5" orient="auto"><path d="M0,0 L9,5 L0,10 z" fill="#5A6B70"/></marker></defs>

  <!-- Internet -->
  <ellipse cx="80" cy="180" rx="58" ry="44" fill="#EAF0F2" stroke="#C7D5D9"/>
  <text x="80" y="178" font-size="14" font-weight="700" fill="#465A60" text-anchor="middle">Internet</text>
  <text x="80" y="196" font-size="11" fill="#8A0F0F" text-anchor="middle">nicht vertrauensw.</text>

  <!-- ext firewall -->
  <rect x="162" y="130" width="60" height="100" rx="6" fill="#C0504D"/>
  <text x="192" y="180" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle" transform="rotate(-90 192 180)">Firewall extern</text>

  <!-- DMZ -->
  <rect x="250" y="96" width="260" height="168" rx="10" fill="#FCF3E1" stroke="#E0A93B" stroke-width="1.5"/>
  <text x="380" y="120" font-size="15" font-weight="700" fill="#B5790A" text-anchor="middle">DMZ</text>
  <rect x="270" y="140" width="100" height="50" rx="6" fill="#fff" stroke="#E0A93B"/><text x="320" y="162" font-size="12.5" font-weight="700" fill="#1F2D31" text-anchor="middle">Webserver</text><text x="320" y="178" font-size="10.5" fill="#5A6B70" text-anchor="middle">:80 / :443</text>
  <rect x="390" y="140" width="100" height="50" rx="6" fill="#fff" stroke="#E0A93B"/><text x="440" y="162" font-size="12.5" font-weight="700" fill="#1F2D31" text-anchor="middle">Mailserver</text><text x="440" y="178" font-size="10.5" fill="#5A6B70" text-anchor="middle">:25 / :993</text>
  <text x="380" y="232" font-size="11.5" fill="#7A5A12" text-anchor="middle">öffentlich erreichbar – aber vom LAN getrennt</text>

  <!-- int firewall -->
  <rect x="538" y="130" width="60" height="100" rx="6" fill="#C0504D"/>
  <text x="568" y="180" font-size="12.5" font-weight="700" fill="#fff" text-anchor="middle" transform="rotate(-90 568 180)">Firewall intern</text>

  <!-- LAN -->
  <rect x="626" y="96" width="272" height="168" rx="10" fill="#EFF7F4" stroke="#2F6E86" stroke-width="1.5"/>
  <text x="762" y="120" font-size="15" font-weight="700" fill="#2F6E86" text-anchor="middle">Internes LAN (vertrauenswürdig)</text>
  <rect x="660" y="150" width="60" height="44" rx="5" fill="#2F6E86"/><text x="690" y="176" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PC</text>
  <rect x="745" y="150" width="60" height="44" rx="5" fill="#2F6E86"/><text x="775" y="176" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">PC</text>
  <rect x="828" y="150" width="60" height="44" rx="5" fill="#2F6E86"/><text x="858" y="176" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Server</text>

  <!-- flow -->
  <line x1="138" y1="180" x2="160" y2="180" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#fa)"/>
  <line x1="222" y1="180" x2="248" y2="180" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#fa)"/>
  <line x1="510" y1="180" x2="536" y2="180" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#fa)"/>
  <line x1="598" y1="180" x2="624" y2="180" stroke="#5A6B70" stroke-width="2.5" marker-end="url(#fa)"/>

  <text x="20" y="300" font-size="13" font-weight="700" fill="#114B58">Idee dahinter</text>
  <text x="20" y="322" font-size="12.5" fill="#3A4A4F">Wird ein Server in der DMZ gehackt, sitzt der Angreifer NICHT automatisch im internen LAN – die innere Firewall trennt beide.</text>
  <text x="20" y="342" font-size="12.5" fill="#3A4A4F">Regelidee: Internet → DMZ erlaubt (Ports 80/443/25). DMZ → LAN grundsätzlich verboten. LAN → alles erlaubt.</text>
</svg>
