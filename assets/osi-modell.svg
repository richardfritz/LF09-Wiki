<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1030 668" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1030" height="668" fill="#ffffff"/>
  <text x="20" y="34" font-size="24" font-weight="700" fill="#114B58">Das OSI-Schichtenmodell</text>
  <text x="20" y="54" font-size="14" fill="#5A6B70">7 Schichten – von der Anwendung (oben) bis zum physischen Medium (unten)</text>
  <text x="980" y="54" font-size="12" font-weight="700" fill="#5A6B70" text-anchor="middle">PDU</text>

  <!-- Gruppen-Klammern -->
  <line x1="14" y1="64" x2="14" y2="308" stroke="#0E9FB0" stroke-width="3"/>
  <text x="9" y="186" font-size="12" font-weight="700" fill="#0E9FB0" transform="rotate(-90 9 186)" text-anchor="middle">anwendungsorientiert</text>
  <line x1="14" y1="312" x2="14" y2="638" stroke="#2F607A" stroke-width="3"/>
  <text x="9" y="475" font-size="12" font-weight="700" fill="#2F607A" transform="rotate(-90 9 475)" text-anchor="middle">transportorientiert</text>

  <!-- L7 -->
  <g>
    <rect x="100" y="64" width="838" height="78" rx="10" fill="#0E9FB0"/>
    <circle cx="70" cy="103" r="24" fill="#ffffff" stroke="#0E9FB0" stroke-width="3"/>
    <text x="70" y="111" font-size="22" font-weight="700" fill="#0E9FB0" text-anchor="middle">7</text>
    <text x="120" y="96" font-size="20" font-weight="700" fill="#ffffff">Anwendung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Application</tspan></text>
    <text x="120" y="120" font-size="13" fill="#EAF6F8">Dienste für Anwendungen</text>
    <text x="560" y="100" font-size="14" font-weight="600" fill="#ffffff">DNS · HTTP(S) · SMTP · FTP · DHCP</text>
    <rect x="946" y="84" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="108" font-size="13" font-weight="700" fill="#0E9FB0" text-anchor="middle">Daten</text>
  </g>
  <!-- L6 -->
  <g>
    <rect x="100" y="146" width="838" height="78" rx="10" fill="#1C93A6"/>
    <circle cx="70" cy="185" r="24" fill="#ffffff" stroke="#1C93A6" stroke-width="3"/>
    <text x="70" y="193" font-size="22" font-weight="700" fill="#1C93A6" text-anchor="middle">6</text>
    <text x="120" y="178" font-size="20" font-weight="700" fill="#ffffff">Darstellung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Presentation</tspan></text>
    <text x="120" y="202" font-size="13" fill="#EAF6F8">Datenformat, Codierung, Verschlüsselung</text>
    <text x="560" y="182" font-size="14" font-weight="600" fill="#ffffff">TLS · JPEG · ASCII · MIME</text>
    <rect x="946" y="166" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="190" font-size="13" font-weight="700" fill="#1C93A6" text-anchor="middle">Daten</text>
  </g>
  <!-- L5 -->
  <g>
    <rect x="100" y="228" width="838" height="78" rx="10" fill="#28879C"/>
    <circle cx="70" cy="267" r="24" fill="#ffffff" stroke="#28879C" stroke-width="3"/>
    <text x="70" y="275" font-size="22" font-weight="700" fill="#28879C" text-anchor="middle">5</text>
    <text x="120" y="260" font-size="20" font-weight="700" fill="#ffffff">Sitzung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Session</tspan></text>
    <text x="120" y="284" font-size="13" fill="#EAF6F8">Sitzungen auf- und abbauen, steuern</text>
    <text x="560" y="264" font-size="14" font-weight="600" fill="#ffffff">Sockets · RPC · SIP · NetBIOS</text>
    <rect x="946" y="248" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="272" font-size="13" font-weight="700" fill="#28879C" text-anchor="middle">Daten</text>
  </g>
  <!-- L4 -->
  <g>
    <rect x="100" y="310" width="838" height="78" rx="10" fill="#2E7C92"/>
    <circle cx="70" cy="349" r="24" fill="#ffffff" stroke="#2E7C92" stroke-width="3"/>
    <text x="70" y="357" font-size="22" font-weight="700" fill="#2E7C92" text-anchor="middle">4</text>
    <text x="120" y="342" font-size="20" font-weight="700" fill="#ffffff">Transport <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Transport</tspan></text>
    <text x="120" y="366" font-size="13" fill="#EAF6F8">Ende-zu-Ende, Ports, Zuverlässigkeit</text>
    <text x="560" y="346" font-size="14" font-weight="600" fill="#ffffff">TCP · UDP</text>
    <rect x="946" y="330" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="347" font-size="11" font-weight="700" fill="#2E7C92" text-anchor="middle">Segment/</text>
    <text x="983" y="360" font-size="11" font-weight="700" fill="#2E7C92" text-anchor="middle">Datagr.</text>
  </g>
  <!-- L3 -->
  <g>
    <rect x="100" y="392" width="838" height="78" rx="10" fill="#2F6E86"/>
    <circle cx="70" cy="431" r="24" fill="#ffffff" stroke="#2F6E86" stroke-width="3"/>
    <text x="70" y="439" font-size="22" font-weight="700" fill="#2F6E86" text-anchor="middle">3</text>
    <text x="120" y="424" font-size="20" font-weight="700" fill="#ffffff">Vermittlung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Network</tspan></text>
    <text x="120" y="448" font-size="13" fill="#EAF6F8">Logische Adressen (IP), Wegwahl/Routing</text>
    <text x="560" y="428" font-size="14" font-weight="600" fill="#ffffff">IP · ICMP · ARP* · OSPF</text>
    <rect x="946" y="412" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="436" font-size="13" font-weight="700" fill="#2F6E86" text-anchor="middle">Paket</text>
  </g>
  <!-- L2 -->
  <g>
    <rect x="100" y="474" width="838" height="78" rx="10" fill="#2F607A"/>
    <circle cx="70" cy="513" r="24" fill="#ffffff" stroke="#2F607A" stroke-width="3"/>
    <text x="70" y="521" font-size="22" font-weight="700" fill="#2F607A" text-anchor="middle">2</text>
    <text x="120" y="506" font-size="20" font-weight="700" fill="#ffffff">Sicherung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Data Link</tspan></text>
    <text x="120" y="530" font-size="13" fill="#EAF6F8">MAC-Adressen, Switching, VLAN, Fehlererkennung</text>
    <text x="560" y="510" font-size="14" font-weight="600" fill="#ffffff">Ethernet · 802.1Q · STP · WLAN</text>
    <rect x="946" y="494" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="518" font-size="13" font-weight="700" fill="#2F607A" text-anchor="middle">Frame</text>
  </g>
  <!-- L1 -->
  <g>
    <rect x="100" y="556" width="838" height="78" rx="10" fill="#2F536E"/>
    <circle cx="70" cy="595" r="24" fill="#ffffff" stroke="#2F536E" stroke-width="3"/>
    <text x="70" y="603" font-size="22" font-weight="700" fill="#2F536E" text-anchor="middle">1</text>
    <text x="120" y="588" font-size="20" font-weight="700" fill="#ffffff">Bitübertragung <tspan font-size="13" font-weight="400" fill="#D7EEF1">· Physical</tspan></text>
    <text x="120" y="612" font-size="13" fill="#EAF6F8">Signale, Spannungen, Kabel, Stecker</text>
    <text x="560" y="592" font-size="14" font-weight="600" fill="#ffffff">RJ45/TP · LWL · Hub · RS-232</text>
    <rect x="946" y="576" width="74" height="38" rx="8" fill="#ffffff"/>
    <text x="983" y="600" font-size="13" font-weight="700" fill="#2F536E" text-anchor="middle">Bit</text>
  </g>

  <text x="100" y="658" font-size="11.5" fill="#5A6B70">* ARP wird je nach Quelle Schicht 2/3 zugeordnet (Bindeglied MAC ↔ IP). TLS funktional Schicht 5/6, in der Praxis über TCP (Schicht 4).</text>
</svg>
