<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="480" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">IPv4-Adresse: Netz- und Hostanteil</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Beispiel: 192.168.10.130 / 26 — die Subnetzmaske trennt Netzanteil von Hostanteil.</text>

  <!-- decimal octets -->
  <g font-size="26" font-weight="700" fill="#114B58" text-anchor="middle">
    <text x="120" y="96">192</text><text x="310" y="96">168</text><text x="500" y="96">10</text><text x="690" y="96">130</text>
  </g>
  <g font-size="22" font-weight="700" fill="#9AB0B6" text-anchor="middle">
    <text x="215" y="132">.</text><text x="405" y="132">.</text><text x="595" y="132">.</text>
  </g>

  <!-- bit cells: o0=192 o1=168 o2=10 o3=130 ; net=teal host=gold -->
  <g font-family="Consolas, monospace" font-size="14" font-weight="700" text-anchor="middle">
    <!-- o0 11000000 -->
    <g>
      <rect x="40"  y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="49"  y="132" fill="#fff">1</text>
      <rect x="60"  y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="69"  y="132" fill="#fff">1</text>
      <rect x="80"  y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="89"  y="132" fill="#fff">0</text>
      <rect x="100" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="109" y="132" fill="#fff">0</text>
      <rect x="120" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="129" y="132" fill="#fff">0</text>
      <rect x="140" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="149" y="132" fill="#fff">0</text>
      <rect x="160" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="169" y="132" fill="#fff">0</text>
      <rect x="180" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="189" y="132" fill="#fff">0</text>
    </g>
    <!-- o1 10101000 -->
    <g>
      <rect x="230" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="239" y="132" fill="#fff">1</text>
      <rect x="250" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="259" y="132" fill="#fff">0</text>
      <rect x="270" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="279" y="132" fill="#fff">1</text>
      <rect x="290" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="299" y="132" fill="#fff">0</text>
      <rect x="310" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="319" y="132" fill="#fff">1</text>
      <rect x="330" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="339" y="132" fill="#fff">0</text>
      <rect x="350" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="359" y="132" fill="#fff">0</text>
      <rect x="370" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="379" y="132" fill="#fff">0</text>
    </g>
    <!-- o2 00001010 -->
    <g>
      <rect x="420" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="429" y="132" fill="#fff">0</text>
      <rect x="440" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="449" y="132" fill="#fff">0</text>
      <rect x="460" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="469" y="132" fill="#fff">0</text>
      <rect x="480" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="489" y="132" fill="#fff">0</text>
      <rect x="500" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="509" y="132" fill="#fff">1</text>
      <rect x="520" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="529" y="132" fill="#fff">0</text>
      <rect x="540" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="549" y="132" fill="#fff">1</text>
      <rect x="560" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="569" y="132" fill="#fff">0</text>
    </g>
    <!-- o3 10000010 : first 2 net, last 6 host -->
    <g>
      <rect x="610" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="619" y="132" fill="#fff">1</text>
      <rect x="630" y="112" width="18" height="30" rx="3" fill="#2F6E86"/><text x="639" y="132" fill="#fff">0</text>
      <rect x="650" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="659" y="132" fill="#5A3A00">0</text>
      <rect x="670" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="679" y="132" fill="#5A3A00">0</text>
      <rect x="690" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="699" y="132" fill="#5A3A00">0</text>
      <rect x="710" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="719" y="132" fill="#5A3A00">0</text>
      <rect x="730" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="739" y="132" fill="#5A3A00">1</text>
      <rect x="750" y="112" width="18" height="30" rx="3" fill="#E0A93B"/><text x="759" y="132" fill="#5A3A00">0</text>
    </g>
  </g>

  <!-- brackets -->
  <line x1="40" y1="152" x2="648" y2="152" stroke="#2F6E86" stroke-width="2.5"/>
  <text x="344" y="170" font-size="13" font-weight="700" fill="#2F6E86" text-anchor="middle">Netzanteil · 26 Bit · Maske 255.255.255.192</text>
  <line x1="650" y1="152" x2="768" y2="152" stroke="#E0A93B" stroke-width="2.5"/>
  <text x="709" y="170" font-size="13" font-weight="700" fill="#B5790A" text-anchor="middle">Host · 6 Bit</text>

  <!-- results panel -->
  <rect x="20" y="196" width="860" height="262" rx="10" fill="#F2F9FB" stroke="#D7EEF1"/>
  <text x="40" y="228" font-size="16" font-weight="700" fill="#114B58">So rechnet man (Magic-Number-Methode)</text>
  <g font-size="14.5" fill="#1F2D31">
    <text x="40" y="262">Präfix / CIDR:</text>            <text x="300" y="262" font-weight="700">/26</text>
    <text x="40" y="290">Subnetzmaske:</text>            <text x="300" y="290" font-weight="700">255.255.255.192</text>
    <text x="40" y="318">Blockgröße (Magic Number):</text><text x="300" y="318" font-weight="700">256 − 192 = 64</text>
    <text x="40" y="346">Netzwerkadresse:</text>         <text x="300" y="346" font-weight="700" fill="#2F6E86">192.168.10.128</text>
    <text x="40" y="374">Broadcastadresse:</text>        <text x="300" y="374" font-weight="700" fill="#C0504D">192.168.10.191</text>
    <text x="40" y="402">Erster / letzter Host:</text>    <text x="300" y="402" font-weight="700">.129 … .190</text>
    <text x="40" y="430">Nutzbare Hosts:</text>          <text x="300" y="430" font-weight="700">2⁶ − 2 = 62</text>
  </g>
  <g font-size="13" fill="#3A4A4F">
    <text x="540" y="262" font-weight="700" fill="#114B58">Eselsbrücke</text>
    <text x="540" y="288">130 liegt zwischen den Vielfachen</text>
    <text x="540" y="308">von 64: … 64, 128, 192 …</text>
    <text x="540" y="332">→ nächstes Vielfaches darunter = 128</text>
    <text x="540" y="352">→ Netz = .128, Broadcast = .128+64−1</text>
    <text x="540" y="372">−2 bei den Hosts: Netz- und</text>
    <text x="540" y="392">Broadcastadresse sind nicht nutzbar.</text>
  </g>
</svg>
