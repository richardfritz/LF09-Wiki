<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="940" height="300" fill="#ffffff"/>
  <text x="20" y="30" font-size="22" font-weight="700" fill="#114B58">IPv6-Adressen kürzen – zwei Regeln</text>
  <text x="20" y="50" font-size="13" fill="#5A6B70">1) Führende Nullen je Block weglassen. 2) Eine zusammenhängende Null-Folge durch :: ersetzen (nur einmal!).</text>

  <defs><marker id="ka" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 z" fill="#9AB0B6"/></marker></defs>

  <text x="24" y="92" font-size="12.5" font-weight="700" fill="#114B58">Original</text>
  <rect x="300" y="74" width="620" height="40" rx="6" fill="#EEF1F2" stroke="#C7D5D9"/>
  <text x="610" y="100" font-family="Consolas, monospace" font-size="16" fill="#1F2D31" text-anchor="middle">2001:0db8:0000:0000:0000:ff00:0042:8329</text>

  <text x="24" y="162" font-size="12.5" font-weight="700" fill="#114B58">① Führende Nullen weg</text>
  <rect x="300" y="144" width="620" height="40" rx="6" fill="#EAF2F4" stroke="#2F6E86"/>
  <text x="610" y="170" font-family="Consolas, monospace" font-size="16" fill="#1F2D31" text-anchor="middle">2001:db8:0:0:0:ff00:42:8329</text>

  <text x="24" y="232" font-size="12.5" font-weight="700" fill="#114B58">② Null-Folge → ::</text>
  <rect x="300" y="214" width="620" height="40" rx="6" fill="#E7F5F7" stroke="#0E9FB0"/>
  <text x="610" y="240" font-family="Consolas, monospace" font-size="17" font-weight="700" fill="#1F2D31" text-anchor="middle">2001:db8<tspan fill="#0E7C8C">::</tspan>ff00:42:8329</text>

  <line x1="610" y1="114" x2="610" y2="142" stroke="#9AB0B6" stroke-width="2" marker-end="url(#ka)"/>
  <line x1="610" y1="184" x2="610" y2="212" stroke="#9AB0B6" stroke-width="2" marker-end="url(#ka)"/>

  <text x="24" y="286" font-size="12" fill="#5A6B70">Hinweis: <tspan font-weight="700" fill="#C0504D">::</tspan> darf nur <tspan font-weight="700">einmal</tspan> vorkommen – sonst wäre die Länge der Null-Folge mehrdeutig.</text>
</svg>
