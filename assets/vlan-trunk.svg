<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="20" y="32" font-size="22" font-weight="700" fill="#114B58">VLAN, Trunk &amp; Inter-VLAN-Routing</text>
  <text x="20" y="52" font-size="13" fill="#5A6B70">Access-Ports gehören zu einem VLAN. Ein Trunk (802.1Q) trägt mehrere VLANs über eine Leitung.</text>

  <!-- Router on a stick -->
  <rect x="380" y="92" width="150" height="48" rx="8" fill="#2F6E86"/>
  <text x="455" y="113" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Router (RoSt)</text>
  <text x="455" y="131" font-size="11" fill="#D7EEF1" text-anchor="middle">Inter-VLAN-Routing</text>
  <text x="545" y="112" font-size="11.5" fill="#3A4A4F">Fa0/0.10 → Gateway VLAN 10</text>
  <text x="545" y="129" font-size="11.5" fill="#3A4A4F">Fa0/0.20 → Gateway VLAN 20</text>

  <!-- Switches -->
  <rect x="120" y="250" width="150" height="46" rx="7" fill="#2F607A"/>
  <text x="195" y="278" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Switch 1</text>
  <rect x="620" y="250" width="150" height="46" rx="7" fill="#2F607A"/>
  <text x="695" y="278" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Switch 2</text>

  <!-- Trunk SW1-SW2 -->
  <line x1="270" y1="273" x2="620" y2="273" stroke="#6B7B80" stroke-width="6"/>
  <rect x="360" y="226" width="190" height="22" rx="11" fill="#EAF0F2"/>
  <text x="455" y="242" font-size="12" font-weight="700" fill="#465A60" text-anchor="middle">Trunk · 802.1Q (VLAN 10+20)</text>

  <!-- Trunk Router-SW1 -->
  <line x1="455" y1="140" x2="210" y2="250" stroke="#6B7B80" stroke-width="6"/>
  <text x="300" y="188" font-size="12" font-weight="700" fill="#465A60" transform="rotate(-24 300 188)">Trunk</text>

  <!-- Access links -->
  <line x1="170" y1="296" x2="96" y2="360" stroke="#C0504D" stroke-width="3.5"/>
  <line x1="220" y1="296" x2="206" y2="360" stroke="#2F6E86" stroke-width="3.5"/>
  <line x1="670" y1="296" x2="626" y2="360" stroke="#C0504D" stroke-width="3.5"/>
  <line x1="720" y1="296" x2="746" y2="360" stroke="#2F6E86" stroke-width="3.5"/>

  <!-- PCs -->
  <g>
    <rect x="74" y="360" width="44" height="32" rx="4" fill="#C0504D"/><text x="96" y="408" font-size="11.5" font-weight="700" fill="#1F2D31" text-anchor="middle">PC1 · V10</text>
    <rect x="184" y="360" width="44" height="32" rx="4" fill="#2F6E86"/><text x="206" y="408" font-size="11.5" font-weight="700" fill="#1F2D31" text-anchor="middle">PC2 · V20</text>
    <rect x="604" y="360" width="44" height="32" rx="4" fill="#C0504D"/><text x="626" y="408" font-size="11.5" font-weight="700" fill="#1F2D31" text-anchor="middle">PC3 · V10</text>
    <rect x="724" y="360" width="44" height="32" rx="4" fill="#2F6E86"/><text x="746" y="408" font-size="11.5" font-weight="700" fill="#1F2D31" text-anchor="middle">PC4 · V20</text>
  </g>

  <!-- Legend -->
  <rect x="300" y="430" width="16" height="14" rx="3" fill="#C0504D"/><text x="322" y="442" font-size="12" fill="#3A4A4F">VLAN 10 „Verkauf“</text>
  <rect x="470" y="430" width="16" height="14" rx="3" fill="#2F6E86"/><text x="492" y="442" font-size="12" fill="#3A4A4F">VLAN 20 „IT“</text>
  <rect x="600" y="430" width="16" height="14" rx="3" fill="#6B7B80"/><text x="622" y="442" font-size="12" fill="#3A4A4F">Trunk (alle VLANs)</text>
</svg>
